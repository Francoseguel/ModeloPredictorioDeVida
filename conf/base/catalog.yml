# Pediátricos: paqy_j, whqmec_j, cbqpfc_j, ecq_j
# Cuestionarios redundantes/no predictivos: inq_j, ucot_j, smqfam_j, smqshs_j,
#   smqrtu_j, cdq_j, rxqasa_j, rxq_drug, acq_j, deq_j, imq_j, hoq_j, ocq_j,
#   cbq_j, cbqpfa_j, dbq_j, vtq_j, puqmec_j, fsq_j, auq_j, aux_j, auxar_j,
#   auxtym_j, auxwbr_j, ohq_j, ohxden_j, ohxref_j, duq_j, rhq_j, osq_j,
#   fetib_j, tfr_j, folate_j, folfms_j, vic_j, vitaec_j, ucflow_j, ucpreg_j,
