# Surplus (SS*): ssagp_j, ssfr_j, ssglyp_j, ssneon_j, sspfas_j, sstst_j,
#   ssuvcm_j, ssuvoc_j
# Serologías: cmv_j, hepa_j, hepb_s_j, hepbd_j, hepc_j, hepe_j, hiv_j, heq_j
# Dietético granular/lookups: dr1iff_j, dr2iff_j, drxfcd_j, ds1ids_j, ds2ids_j,
