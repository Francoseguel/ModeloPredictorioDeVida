# DATASETS ELIMINADOS (~96) — referencia para reactivación
# -----------------------------------------------------------------------------
# Definición completa en: docs/catalog_full_backup.yml
#
# Ambientales/toxicológicos: ephpp_j, ethox_j, crco_j, opd_j, pah_j, pernt_j,
