# CASO LÍMITE — DXA (composición corporal por absorciometría)
# -----------------------------------------------------------------------------
# Restringido a 8-59 años en el ciclo _J -> excluye ancianos (MNAR severa).
# Descomenta SOLO si restringes la cohorte a <=59 años.
# Vars clave: DXDTOLE (masa magra), DXDTOFAT (grasa), DXXVFATV (grasa visceral)
#
# dxx_j_dataset:
#   type: pandas.GenericDataset
