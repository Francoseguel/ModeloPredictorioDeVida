# Catálogo DEPURADO: solo los 27 datasets seleccionados para el pipeline de
# predicción de longevidad (Tier 1 + 4 de Tier 2).
#
# Decisión documentada en: Decision_Conservar_Eliminar_NHANES.md
# Backup del catálogo completo original: docs/catalog_full_backup.yml
# (fuera de conf/ a propósito: Kedro carga TODO catalog*.yml dentro de conf/)
