# OUTCOME — LINKED MORTALITY FILE (NCHS)  [PENDIENTE DE DESCARGA]
# -----------------------------------------------------------------------------
# El LMF NO viene con los .xpt. Descarga el archivo de ancho fijo:
#   NHANES_2017_2018_MORT_2019_PUBLIC.dat
# y colócalo en data/01_raw/. Es FIXED-WIDTH: NO usar file_format sas.
# Vars: SEQN, ELIGSTAT, MORTSTAT, PERMTH_INT, PERMTH_EXM, UCOD_LEADING.
# Lo más limpio es un nodo de carga con pandas.read_fwf (colspecs del NCHS).
# Descomenta y ajusta cuando tengas el archivo:
#
# mortality_lmf_dataset:
#   type: pandas.GenericDataset
#   filepath: data/01_raw/NHANES_2017_2018_MORT_2019_PUBLIC.dat
#   # requiere loader fwf personalizado (read_fwf) — ver pipeline de carga
# #############################################################################


